name: Backend Checks

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend-contract:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile backend Python files
        run: python -m py_compile $(find backend -type f -name '*.py' | sort)

      - name: Build demo business state
        run: python backend/scripts/build_demo_business_state.py

      - name: Build full demo bundle
        run: python backend/scripts/build_demo_bundle.py

      - name: Run backend ingestion tests
        run: python -m unittest discover -s backend/tests

      - name: Verify generated demo artifacts are committed
        run: git diff --exit-code -- backend/data/demo_inputs/business_state.json backend/data/demo_inputs/daily_brief.json frontend/public/demo/daily_brief.json
